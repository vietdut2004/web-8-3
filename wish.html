<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chúc mẹ ngày 8/3</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
text-align:center;
overflow:hidden;
animation:fadeIn 1s;
}

@keyframes fadeIn{
0%{opacity:0;transform:scale(1.2)}
100%{opacity:1;transform:scale(1)}
}

/* card */
.card{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* ảnh xòe quạt */
.fan{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
margin-bottom:25px;
}

.fan img{
width:130px;
border-radius:12px;
box-shadow:0 10px 20px rgba(0,0,0,0.3);
cursor:pointer;
transition:0.3s;
}

.fan img:nth-child(1){transform:rotate(-20deg);}
.fan img:nth-child(2){transform:rotate(-8deg);}
.fan img:nth-child(3){transform:rotate(8deg);}
.fan img:nth-child(4){transform:rotate(20deg);}

/* tiêu đề */
h1{
color:#ff0033;
font-size:40px;
}

/* lời chúc */
.message{
font-size:26px;
font-weight:bold;
margin-top:10px;
background:linear-gradient(90deg,#ff0055,#ffcc00);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* hoa rơi */
.flower{
position:fixed;
top:-20px;
font-size:24px;
animation:fall linear forwards;
}

@keyframes fall{
0%{transform:translateY(-20px)}
100%{transform:translateY(100vh)}
}

/* nền tối khi phóng to ảnh */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

/* ảnh phóng to */
.overlay img{
width:520px;
border-radius:15px;
box-shadow:0 20px 50px rgba(0,0,0,0.7);
animation:zoom 0.3s;
}

@keyframes zoom{
0%{transform:scale(0.3)}
100%{transform:scale(1)}
}

</style>
</head>

<body>

<div class="card">

<div class="fan">
<img src="z7599810387342_6d7212dac40f58319a9e137b926dba32.jpg">
<img src="z7599810579458_4be778049cde57e5ecad58ed67892b27.jpg">
<img src="z7599810585631_e4123bd2ae2134bd609826e7df236aa0.jpg">
<img src="z7599810589162_79595695797279168252f4b1ae185379.jpg">
</div>

<h1>💐 Chúc mẹ ngày 8/3 💐</h1>

<div class="message">
Nhân ngày 8/3, con chúc mẹ luôn mạnh khỏe, vui vẻ và hạnh phúc.
Cảm ơn mẹ vì đã luôn yêu thương, chăm sóc và hy sinh cho con mỗi ngày.
Mẹ luôn là người tuyệt vời nhất trong cuộc đời con.
Con yêu mẹ rất nhiều! ❤️
</div>

</div>

<script>

/* hoa rơi */
function createFlower(){

let flower=document.createElement("div");

flower.className="flower";

flower.innerHTML="🌸";

flower.style.left=Math.random()*100+"vw";

flower.style.fontSize=(Math.random()*20+15)+"px";

flower.style.animationDuration=(Math.random()*4+3)+"s";

document.body.appendChild(flower);

setTimeout(()=>flower.remove(),7000);

}

setInterval(createFlower,300);


/* phóng to ảnh */
document.querySelectorAll(".fan img").forEach(img=>{
img.onclick=function(){

let overlay=document.createElement("div");
overlay.className="overlay";

let big=document.createElement("img");
big.src=this.src;

overlay.appendChild(big);

document.body.appendChild(overlay);

overlay.onclick=function(){
overlay.remove();
}

}
});

</script>

</body>

</html>
