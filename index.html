<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chúc Mừng 8/3</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
overflow:hidden;
}

/* card */
.card{
background:white;
padding:50px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
transition:1s;
}

h1{
color:#ff0033;
font-size:50px;
text-shadow:0 0 15px #ff4d6d,0 0 30px #ff1e4d;
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:10px;
background:#ff4d6d;
color:white;
cursor:pointer;
margin-top:20px;
}

/* hiệu ứng chuyển trang */
.fade-out{
animation:fadeOut 1s forwards;
}

@keyframes fadeOut{
0%{opacity:1;transform:scale(1)}
100%{opacity:0;transform:scale(1.2)}
}

</style>

</head>

<body id="page">

<div class="card">

<h1>🌸 Chúc Mừng Ngày 8/3 🌸</h1>

<p>Gửi mẹ phụ nữ tuyệt vời</p>

<button onclick="nextPage()">Đây là món quà nhỏ của con 🎁 💖</button>

</div>

<script>

function nextPage(){

document.getElementById("page").classList.add("fade-out");

setTimeout(function(){

window.location.href="wish.html";

},900);

}

</script>

</body>
</html>
