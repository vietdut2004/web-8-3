<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Video chúc mừng 8/3</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Arial;
text-align:center;
color:white;
background:linear-gradient(135deg,#ff758c,#ff7eb3,#fad0c4);
background-size:400% 400%;
animation:bgmove 10s infinite alternate;
overflow:hidden;
}

@keyframes bgmove{
0%{background-position:left}
100%{background-position:right}
}

h1{
font-size:36px;
margin-bottom:20px;
text-shadow:2px 2px 10px rgba(0,0,0,0.4);
}

video{
width:75%;
max-width:800px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.5);
}

button{
margin-top:25px;
padding:12px 30px;
font-size:18px;
border:none;
border-radius:30px;
background:#ff3366;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#ff0033;
transform:scale(1.05);
}

.flower{
position:fixed;
top:-20px;
font-size:22px;
animation:fall linear forwards;
}

@keyframes fall{
0%{transform:translateY(-20px)}
100%{transform:translateY(100vh)}
}

.heart{
position:fixed;
bottom:-20px;
font-size:24px;
animation:fly 4s linear forwards;
}

@keyframes fly{
0%{transform:translateY(0) scale(1)}
100%{transform:translateY(-100vh) scale(1.5)}
}

</style>
</head>

<body>

<h1>✨ Món quà 8/3 dành tặng mẹ ✨</h1>

<video id="video" controls autoplay>
<source src="../7600111388173.mp4" type="video/mp4">
</video>

<button onclick="window.location.href='wish.html'">
⬅ Quay lại lời chúc
</button>

<script>

function createFlower(){

let flower=document.createElement("div");
flower.className="flower";
flower.innerHTML="🌸";

flower.style.left=Math.random()*100+"vw";
flower.style.fontSize=(Math.random()*20+15)+"px";
flower.style.animationDuration=(Math.random()*5+4)+"s";

document.body.appendChild(flower);

setTimeout(()=>flower.remove(),8000);
}

setInterval(createFlower,400);


function createHeart(){

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*25+20)+"px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),4000);
}

document.getElementById("video").onended=function(){

for(let i=0;i<40;i++){

setTimeout(createHeart,i*120);

}

alert("💐 Chúc mẹ luôn hạnh phúc và vui vẻ! 💐");

}

</script>

</body>
</html>
